<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MosAIc — a reconfigurable surface for directing an LLM. An LLM emits a JSON overlay; the surface reshapes to fit the task.">
  <title>MosAIc</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta property="og:title" content="MosAIc">
  <meta property="og:description" content="A reconfigurable surface for directing an LLM — the panels reshape per task.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="screenshot.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Seed the theme before first paint so a dark user never sees a light flash. -->
  <script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('mosaic-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'))}catch(e){}</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-title">MosAIc</div>
        <div class="brand-sub">a reconfigurable surface for directing an LLM</div>
      </div>
      <nav id="nav"></nav>
      <div id="subject-rail" hidden></div>
    </aside>
    <main id="main">
      <div id="cmdbar" class="cmdbar">
        <button id="sb-toggle" class="cmd-icon" type="button" aria-label="Hide sidebar" title="Hide sidebar">
          <span class="sb-chev" aria-hidden="true">‹</span>
        </button>
        <svg class="cmd-mark" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <rect x="0" y="0" width="8" height="8" rx="1.5"/><rect x="10" y="0" width="8" height="8" rx="1.5"/>
          <rect x="0" y="10" width="8" height="8" rx="1.5"/><rect x="10" y="10" width="8" height="8" rx="1.5"/>
        </svg>
        <form id="cmd-form" class="cmd-prompt-wrap" autocomplete="off">
          <input id="cmd-prompt" class="cmd-prompt" type="text" autocomplete="off"
                 placeholder="Direct the surface — e.g. “explain how OAuth works” or “plan a weekend in Rome”…" aria-label="Direct the surface — type a task">
          <span class="cmd-spinner" hidden aria-hidden="true"></span>
          <div id="cmd-suggest" class="cmd-suggest" role="listbox" hidden></div>
        </form>
        <button id="composer-open" class="cmd-btn" type="button">✎ Composer</button>
        <button id="okf-open" class="cmd-btn" type="button" title="Open an Open Knowledge Format bundle">▣ OKF</button>
        <input id="okf-search" class="okf-search" type="text" placeholder="Filter concepts…" aria-label="Filter OKF concepts" autocomplete="off" hidden>
        <button id="cmd-reset" class="cmd-reset" type="button">Reset</button>
        <button id="cmd-account" class="cmd-account" type="button">Sign in</button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">◐ Theme</button>
      </div>
      <div id="view"></div>
    </main>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
